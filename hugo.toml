# ═══════════════════════════════════════
# Hugo 博客站点配置
# ═══════════════════════════════════════

# 【重要】替换为你的 GitHub Pages 地址
# 格式: https://你的GitHub用户名.github.io/
baseURL = 'https://YOUR_USERNAME.github.io/'

# 站点基本信息
languageCode = 'zh-cn'
title = '我的技术博客'

# 使用 Ananke 主题
theme = 'ananke'

# 分页：每页显示 6 篇文章
paginate = 6

# 启用 Emoji 支持
enableEmoji = true

# ─── 顶部导航菜单 ───
# 对应 content/ 目录下的 sections
[[menu.main]]
  identifier = 'posts'
  name = '文章'
  url = '/posts/'
  weight = 1

[[menu.main]]
  identifier = 'tags'
  name = '标签'
  url = '/tags/'
  weight = 2

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = '/about/'
  weight = 3

# ─── Ananke 主题参数 ───
[params]
  # 站点描述（会显示在首页和 SEO 中）
  description = '个人技术博客，记录学习与思考'

  # 首页显示的最近文章数量
  recent_posts_count = 5

  # 可选：设置 favicon (放到 static/images/ 目录下)
  # favicon = 'images/favicon.ico'

  # 社交媒体链接（可选）
  [params.ananke_socials]
    github = ''
    # twitter = ''
    # zhihu = ''
